# Base palette for the "Vapor–Liquid Equilibrium Console" theme.
# Fine-grained styling (fonts, hero, phase cards) is injected as CSS from
# thermo/interface.py; this file themes Streamlit's native widgets to match.
[theme]
base = "light"
primaryColor = "#1d4ed8"
backgroundColor = "#f4f6f9"
secondaryBackgroundColor = "#ffffff"
textColor = "#0f172a"
linkColor = "#1d4ed8"
baseRadius = "0.4rem"
borderColor = "#dbe1ea"
showWidgetBorder = true
showSidebarBorder = true
